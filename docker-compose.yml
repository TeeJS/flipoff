services:
  flipoff:
    image: ghcr.io/teejs/flipoff:latest
    build: .
    container_name: flipoff
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - PORT=${PORT:-8080}
    volumes:
      - flipoff-data:/home/flipoff/.flipoff
    restart: unless-stopped

volumes:
  flipoff-data:
